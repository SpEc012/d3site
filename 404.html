<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Page not found — D3 Inspection</title>
  <link rel="icon" type="image/jpeg" href="images/logo.jpg" />
  <link
    href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .nf {
      min-height: 70vh;
      display: grid;
      place-content: center;
      gap: 1.1rem;
      text-align: center;
    }
    .nf img { width: 170px; margin: 0 auto; }
    .nf h1 {
      font-size: clamp(2.6rem, 9vw, 4rem);
      letter-spacing: 0.12em;
      color: var(--ink-strong);
    }
    .nf p { color: var(--muted); }
  </style>
</head>

<body>
  <div class="page">
    <main class="card">
      <span class="card__accent" aria-hidden="true"></span>
      <section class="nf">
        <img src="images/logo.jpg" alt="D3 Inspection logo" />
        <h1>404</h1>
        <p>Sorry — that page doesn't exist.</p>
        <div class="cta-row" style="justify-content:center">
          <a class="btn btn--primary" href="/">Back to home</a>
        </div>
      </section>
    </main>
  </div>
</body>

</html>
